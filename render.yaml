# Render Blueprint — provisions the PostgreSQL database and the Dockerized
# FastAPI backend together. Deploy via Render Dashboard → "New +" → "Blueprint".
#
# After the first deploy, set CORS_ORIGINS on the web service to your Vercel
# frontend URL (e.g. https://your-app.vercel.app) and redeploy.

databases:
  - name: order-management-db
    databaseName: order_management
    user: order_management
    plan: free

services:
  - type: web
    name: order-management-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      # Single connection string, injected automatically from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: order-management-db
          property: connectionString
      # Set this to your deployed frontend origin after Vercel is live.
      - key: CORS_ORIGINS
        sync: false
